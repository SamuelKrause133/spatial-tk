# Optional: full conda.solve install (requires a normal conda index; some sites set
# `use_only_tar_bz2=true` which hides most conda-forge builds and breaks this path).
#
# **Recommended:** use `make venv-image` instead — same idea as `main`’s `make venv`
# (bare conda env + pip), with JDK from conda and deps from `requirements-image.txt`.

name: spatial-tk-image
channels:
  - conda-forge
dependencies:
  - python=3.10
  - openjdk=17
  - pip
