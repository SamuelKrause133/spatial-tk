# TOML configuration file for PDAC samples

[concat]
# Path to CSV file listing samples (columns: sample, path, [metadata...])
input = "samples.csv"
# Path to output concatenated .zarr file
output = "data.zarr"
# Fraction of cells to keep (0-1, default: 1.0 = no downsampling)
downsample = 1.0

[normalize]
# Path to input .zarr file
input = "data.zarr"
# Modify the input file in place instead of creating a new file
inplace = true
# Minimum number of genes expressed per cell
min_genes = 100
# Minimum number of cells expressing a gene
min_cells = 3
# Number of highly variable genes to select
n_top_genes = 1000
# Generate and save QC plots
save_plots = true

[cluster]
# Path to input normalized .zarr file
input = "data.zarr"
# Modify the input file in place instead of creating a new file
inplace = true
# Leiden clustering resolution(s), comma-separated for multiple resolutions
leiden_resolution = "0.2,0.5,1.0"
# Generate and save UMAP plots
save_plots = true
resume = true

[quantitate]
# Path to input clustered .zarr file
input = "data.zarr"
# Modify the input file in place instead of creating a new file
inplace = true
# Path to CSV file with marker genes (columns: cell_type, gene)
markers = "markers.csv"
# Key suffix for custom marker scores
score_key = "custom"
# Scoring method
method = "mlm"
# Minimum number of targets per source for decoupler
tmin = 2
# Also score against built-in decoupler resources
preset_resources = "panglao"
# Minimum sensitivity for PanglaoDB markers
panglao_min_sensitivity = 0.5
# Only use canonical PanglaoDB markers
panglao_canonical_only = true
# No cell filter — score all cells
# filter_obs = null   # TOML has no null; leave commented to use default (None)
# Generate and save enrichment heatmap plots
save_plots = true

[assign]
# Path to input scored .zarr file
input = "data.zarr"
# Modify the input file in place
inplace = true
# obsm key of the scores to assign from (produced by quantitate)
score_key = "score_mlm_custom"
# Use all leiden_res* columns
# cluster_key = null     # TOML has no null; leave commented to use default (None)
# Default annotation key naming
# annotation_key = null  # TOML has no null; leave commented to use default (None)
# Assignment strategy
strategy = "top_positive"
# Run differential expression
run_de = true
# Generate and save annotation plots
save_plots = true

[differential]
# Path to input .zarr file with annotations
input = "data.zarr"
# Directory to save differential analysis results
output_dir = "results/"
# Column in obs to group by for differential analysis
groupby = "leiden_res0p5"
# Comma-separated list of exactly 2 groups to compare (Mode A); omit for all groups (Mode B)
# compare_groups = "HIV,NEG"
# Optional obsm layer for enrichment-based differential analysis (e.g. "score_mlm_PanglaoDB")
# obsm_layer = "score_mlm_PanglaoDB"
# Statistical test method for gene expression DE: "wilcoxon", "t-test", "logreg"
method = "wilcoxon"
# Layer for gene expression DE; omit to use .X
# layer = "counts"
save_plots = false
n_genes = 100

